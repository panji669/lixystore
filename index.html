<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIXY Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        background: #121212;
        font-family: Poppins, sans-serif;
        color: #f2f2f2;
    }

    /* Splash */
    #splash, #namePage, #brandPage, #productPage, #cartPage {
        display: none;
    }

    .center {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        padding: 20px;
    }

    /* Logo bulat */
    .logo {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        overflow: hidden;
        margin-bottom: 20px;
        border: 3px solid #fff;
    }
    .logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    button {
        padding: 12px 20px;
        background: #39ffb4;
        border: none;
        border-radius: 8px;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
        transition: 0.2s;
    }
    button:hover { opacity: 0.8; }

    input {
        padding: 12px;
        width: 80%;
        border-radius: 8px;
        border: none;
        margin-top: 10px;
    }

    /* Header */
    header {
        padding: 15px 20px;
        background: #1E1E1E;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 50;
    }

    header img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        cursor: pointer;
    }

    /* Brand grid */
    .brand-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        padding: 20px;
    }

    /* Fix Coloumn */
    /* ====== GRID PRODUK ====== */
/* CONTAINER LIST */
#productList {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
    padding: 10px;
}

/* 2 kolom di laptop */
@media (min-width: 900px) {
    #productList {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* CARD LIST MODEL */
.product-card {
    display: flex;
    background: #111;
    border-radius: 14px;
    padding: 12px;
    color: white;
    align-items: center;
    gap: 12px;
    min-height: 120px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* GAMBAR KIRI */
.product-card img {
    width: 110px;
    height: 110px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
}

/* TEKS KANAN */
.product-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex: 1;
}

.product-info h3 {
    font-size: 17px;
    margin: 0;
}

.product-info small {
    font-size: 14px;
    opacity: 0.8;
}

/* TOMBOL */
.add-btn {
    background: #27ffae;
    padding: 6px 12px;
    border-radius: 6px;
    color: black;
    font-weight: bold;
    margin-top: 6px;
    width: fit-content;
}

    .search {
        padding: 10px;
        width: 85%;
        border-radius: 8px;
        border: none;
        background: #1f1f1f;
        color: #fff;
        margin: 15px auto 0;
        display: block;
    }

    /* Cart badge */
    .badge {
        background: #ff4444;
        padding: 2px 7px;
        border-radius: 50%;
        font-size: 12px;
        position: relative;
        top: -10px;
        right: 10px;
    }

    /* Cart items */
    .cart-item {
        background: #1e1e1e;
        padding: 12px;
        margin: 12px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
    }

    .qty-btn {
        padding: 5px 10px;
        background: #39ffb4;
        border-radius: 5px;
        color: black;
        cursor: pointer;
        margin: 0 5px;
        font-weight: bold;
    }

    /* Popup */
    #popup {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    #popup .inner {
        background: #1e1e1e;
        padding: 20px;
        border-radius: 12px;
        max-width: 400px;
        width: 100%;
    }
</style>
</head>

<body>

<!-- Splash -->
<div id="splash" class="center">
    <div class="logo"><img src="img/logo.png"></div>
    <h2>LIXY STORE</h2>
    <button onclick="goName()">Mulai</button>
</div>

<!-- Input Nama -->
<div id="namePage" class="center">
    <h2>Masukkan Nama Kamu</h2>
    <input id="buyerName" placeholder="Nama lengkap">
    <button onclick="saveName()">Lanjut</button>
</div>

<!-- Brand -->
<div id="brandPage">
    <header>
        <img src="img/logo.png" onclick="reloadBrand()">
        <div id="helloUser"></div>
        <div onclick="openCart()" style="cursor:pointer;">
            🛒 <span id="badge" class="badge" style="display:none;">0</span>
        </div>
    </header>

    <div class="brand-grid">
        <div class="brand-card" onclick="openBrand('Fore')">Fore</div>
        <div class="brand-card" onclick="openBrand('Kopi Kenangan')">Kopi Kenangan</div>
        <div class="brand-card" onclick="openBrand('Janji Jiwa')">Janji Jiwa</div>
        <div class="brand-card" onclick="openBrand('Tomoro')">Tomoro</div>
        <div class="brand-card" onclick="openBrand('Chagee')">Chagee</div>
    </div>
</div>

<!-- Produk -->
<div id="productPage">
    <header>
        <img src="img/logo.png" onclick="backBrand()">
        <div id="helloUser2"></div>
        <div onclick="openCart()" style="cursor:pointer;">
            🛒 <span id="badge2" class="badge" style="display:none;">0</span>
        </div>
    </header>

    <input class="search" placeholder="Cari minuman..." onkeyup="filterProducts(this.value)">

    <div id="productList" class="product-grid"></div>
</div>

<!-- Cart -->
<div id="cartPage">
    <header>
        <img src="img/logo.png" onclick="backProduct()">
        <div id="helloUser3"></div>
    </header>

    <div id="cartItems"></div>

    <div style="padding:20px;">
        <input id="outletName" placeholder="Outlet mana?" style="width:100%;padding:12px;border-radius:10px;">
        <h3>Total: <span id="totalPrice">Rp 0</span></h3>
        <button onclick="openPopup()">Checkout</button>
    </div>
</div>

<!-- POPUP -->
<div id="popup">
    <div class="inner">
        <h3>Konfirmasi Pesanan</h3>
        <pre id="popupText" style="white-space: pre-wrap;"></pre>
        <button onclick="sendWA()">Benar</button>
        <button onclick="closePopup()" style="background:#ff4444;">Tidak</button>
    </div>
</div>

<script>
/* --------------- PAGE LOGIC --------------- */
window.onload = () => {
    document.getElementById("splash").style.display = "flex";
};

function goName() {
    splash.style.display = "none";
    namePage.style.display = "flex";
}

function saveName() {
    let name = buyerName.value.trim();
    if (name === "") return alert("Nama tidak boleh kosong");
    localStorage.setItem("buyerName", name);

    helloUser.innerText = "Belanja Yuk, " + name;
    helloUser2.innerText = "Belanja Yuk, " + name;
    helloUser3.innerText = "Belanja Yuk, " + name;

    namePage.style.display = "none";
    brandPage.style.display = "block";
}

function reloadBrand() {
    productPage.style.display = "none";
    brandPage.style.display = "block";
}

function backBrand() {
    productPage.style.display = "none";
    brandPage.style.display = "block";
}

/* --------------- FETCH PRODUCTS (FROM JSON BATCH) --------------- */
let allProducts = [];
let currentBrand = "";

async function openBrand(b) {
    currentBrand = b;
    brandPage.style.display = "none";
    productPage.style.display = "block";

    await loadProducts();
}

async function loadProducts() {
    productList.innerHTML = "Loading...";

    try {
        const res = await fetch("products/products.json");
        const data = await res.json();
        const items = data.items || [];

        // simpan semua produk untuk brand yang dipilih
        allProducts = items.filter(p => p.brand === currentBrand);
        renderProducts(allProducts);
    } catch (e) {
        console.error(e);
        productList.innerHTML = "Gagal memuat produk.";
    }
}

function renderProducts(list) {
    productList.innerHTML = "";
    list.forEach((p, i) => {
        productList.innerHTML += `
            <div class="product-card">
                <img src="${p.image}">
                <div>${p.name}</div>
                <small>Rp ${Number(p.price).toLocaleString()}</small><br>
                <span class="add-btn" onclick="addCart(${i})">+ Keranjang</span>
            </div>
        `;
    });
}

function filterProducts(q) {
    q = q.toLowerCase();
    let filtered = allProducts.filter(x => x.name.toLowerCase().includes(q));
    renderProducts(filtered);
}

/* --------------- CART SYSTEM --------------- */

let cart = [];

function addCart(i) {
    let item = allProducts[i];
    let exist = cart.find(c => c.name === item.name && c.brand === item.brand);

    if (exist) exist.qty++;
    else cart.push({...item, qty:1});

    updateBadge();
}

function updateBadge() {
    let qty = cart.reduce((a,b)=>a+b.qty,0);

    if (qty === 0) {
        badge.style.display = "none";
        badge2.style.display = "none";
    } else {
        badge.innerText = qty;
        badge2.innerText = qty;
        badge.style.display = "inline-block";
        badge2.style.display = "inline-block";
    }
}

function openCart() {
    productPage.style.display = "none";
    cartPage.style.display = "block";
    loadCart();
}

function backProduct() {
    cartPage.style.display = "none";
    productPage.style.display = "block";
}

function loadCart() {
    cartItems.innerHTML = "";
    cart.forEach((c, i) => {
        cartItems.innerHTML += `
            <div class="cart-item">
                <div>
                    <strong>${c.name}</strong><br>
                    Rp ${(c.price * c.qty).toLocaleString()}
                </div>
                <div>
                    <span class="qty-btn" onclick="decQty(${i})">-</span>
                    ${c.qty}
                    <span class="qty-btn" onclick="incQty(${i})">+</span>
                </div>
            </div>
        `;
    });

    updateTotal();
}

function incQty(i){ cart[i].qty++; loadCart(); updateBadge(); }
function decQty(i){
    if (cart[i].qty > 1) cart[i].qty--;
    else cart.splice(i,1);

    loadCart();
    updateBadge();
}

function updateTotal() {
    let total = cart.reduce((a,b)=>a + (b.qty*b.price),0);
    totalPrice.innerText = "Rp " + total.toLocaleString();
}

/* --------------- CHECKOUT --------------- */

function openPopup() {
    let name = localStorage.getItem("buyerName");
    let outlet = outletName.value.trim();
    if (outlet === "") return alert("Outlet harus diisi!");

    let listTxt = cart.map(c => `${c.qty}x ${c.name} - Rp ${(c.qty*c.price).toLocaleString()}`).join("\n");

    popupText.innerText = 
`Nama: ${name}
Outlet: ${outlet}

Pesanan:
${listTxt}`;

    popup.style.display = "flex";
}

function closePopup() {
    popup.style.display = "none";
}

function sendWA() {
    let name = localStorage.getItem("buyerName");
    let outlet = outletName.value;

    let listTxt = cart.map(c => `${c.qty}x ${c.name} - Rp ${(c.qty*c.price).toLocaleString()}`).join("%0A");

    let msg = 
`Nama: ${name}
Outlet: ${outlet}

Pesanan:
${listTxt}`
    .replace(/\n/g,"%0A");

    window.location.href = 
    `https://wa.me/6281290306599?text=${msg}`;
}
</script>

</body>
</html>
